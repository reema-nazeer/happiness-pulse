<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homey Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Brand
   Strike Yellow:  #DBFF00
   Storm Purple:   #7C57FC
   Midnight Black: #040406
   Flash White:    #FFFFFF
   8px-based spacing scale used throughout. */

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: #FFFFFF;
  color: #040406;
  -webkit-user-select: none;
  user-select: none;
}
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ---------- Header ---------- */
.header {
  background: #040406;
  padding: 24px 32px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hg1 { position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; background: #7C57FC; opacity: .15; border-radius: 50%; }
.hg2 { position: absolute; bottom: -20px; left: -20px; width: 100px; height: 100px; background: #DBFF00; opacity: .1; border-radius: 50%; }
.hc { position: relative; z-index: 1; }
.logo { display: block; margin: 0 auto 16px; height: 60px; width: auto; }
.header h2 { font-size: 20px; font-weight: 600; color: #FFFFFF; margin: 0 0 4px; letter-spacing: -0.2px; }
.header p { font-size: 13px; color: rgba(255, 255, 255, 0.55); font-weight: 400; }

/* ---------- Body ---------- */
.body {
  padding: 24px 32px 24px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.ql {
  font-size: 14px;
  font-weight: 600;
  color: #040406;
  display: block;
  margin-bottom: 12px;
  letter-spacing: -0.1px;
}
.ql .ol { font-weight: 400; color: #9aa0a6; }

/* ---------- Department pills ---------- */
.pills {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}
@media (min-width: 520px) {
  .pills { grid-template-columns: repeat(4, 1fr); }
}
.pill {
  appearance: none;
  border: 1.5px solid #7C57FC;
  background: transparent;
  color: #7C57FC;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  padding: 10px 8px;
  border-radius: 10px;
  cursor: pointer;
  transition: background-color 150ms ease, color 150ms ease, border-color 150ms ease;
  -webkit-user-select: none;
  user-select: none;
}
.pill:hover { background: rgba(124, 87, 252, 0.06); }
.pill.is-selected {
  background: #7C57FC;
  color: #FFFFFF;
  border-color: #7C57FC;
}
.pill:focus-visible { outline: 2px solid #7C57FC; outline-offset: 2px; }

/* ---------- Slider + emoji ---------- */
.emoji-display {
  text-align: center;
  margin-bottom: 8px;
  font-size: 52px;
  transition: transform 200ms ease;
}
.slider-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 8px;
}
.slider-row span {
  font-size: 12px;
  color: #9aa0a6;
  min-width: 16px;
  font-weight: 500;
}
.slider-row span:last-child { text-align: right; }
input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 8px;
  border-radius: 4px;
  background: linear-gradient(to right, #E24B4A, #FAC775, #7C57FC);
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #DBFF00;
  border: 2px solid #FFFFFF;
  box-shadow: 0 2px 6px rgba(4, 4, 6, 0.18);
  cursor: pointer;
  transition: transform 150ms ease;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.12); }
input[type=range]:focus-visible::-webkit-slider-thumb { box-shadow: 0 0 0 4px rgba(124, 87, 252, 0.25); }

.score-display { text-align: center; margin-bottom: 24px; }
.score-badge {
  display: inline-block;
  background: #040406;
  color: #DBFF00;
  font-size: 28px;
  font-weight: 700;
  padding: 6px 24px;
  border-radius: 12px;
  min-width: 50px;
  transition: transform 150ms ease;
}
.mood-label {
  display: block;
  font-size: 13px;
  color: #888;
  margin-top: 6px;
  font-weight: 500;
  transition: color 200ms ease;
}

/* ---------- Textarea (force readable colours, fix the typing-not-visible bug) ---------- */
textarea {
  width: 100%;
  border: 2px solid #ECECEE;
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 14px;
  font-family: 'Inter', inherit;
  min-height: 80px;
  resize: none;
  /* The bug fix: force colours regardless of dark-mode UA stylesheets, force a
     visible caret, and never let user-agent inverted colours win. */
  color: #040406 !important;
  background: #FFFFFF !important;
  caret-color: #7C57FC;
  -webkit-text-fill-color: #040406 !important; /* Safari sometimes overrides color */
  -webkit-user-select: text;
  user-select: text;
  transition: border-color 200ms ease, box-shadow 200ms ease;
}
textarea:focus {
  outline: 2px solid #7C57FC;
  outline-offset: 2px;
  border-color: #7C57FC;
}
textarea::placeholder { color: #b8bcc4; }

/* ---------- Submit button ---------- */
.submit-btn {
  width: 100%;
  padding: 14px;
  background: #7C57FC;
  color: #FFFFFF;
  border: none;
  border-radius: 12px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background-color 200ms ease, transform 150ms ease, opacity 150ms ease;
  margin-top: 16px;
  letter-spacing: 0.2px;
}
.submit-btn:hover:not(:disabled) { background: #6B45EB; transform: translateY(-1px); }
.submit-btn:active:not(:disabled) { transform: scale(0.98); }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.submit-btn:focus-visible { outline: 2px solid #DBFF00; outline-offset: 2px; }

.footer-note {
  font-size: 11px;
  color: #b8bcc4;
  text-align: center;
  margin-top: 12px;
  font-weight: 400;
}
.change-link {
  display: block;
  font-size: 12px;
  color: #7C57FC;
  text-align: center;
  margin-top: 6px;
  cursor: pointer;
  font-weight: 500;
  text-decoration: underline;
  background: transparent;
  border: 0;
  width: 100%;
  padding: 4px;
  font-family: inherit;
}
.change-link:hover { color: #5A3BD4; }

/* ---------- Thank you ---------- */
.thank-you {
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  min-height: 100vh;
  background: #FFFFFF;
  text-align: center;
  padding: 24px;
}
.success-mark {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #7C57FC;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  transform: scale(0);
  animation: scaleIn 200ms ease-out forwards;
  box-shadow: 0 4px 16px rgba(124, 87, 252, 0.35);
}
.success-mark svg { width: 32px; height: 32px; }
.success-mark .check {
  stroke: #DBFF00;
  stroke-width: 4;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
  stroke-dasharray: 36;
  stroke-dashoffset: 36;
  animation: drawCheck 300ms 200ms ease-out forwards;
}
.thank-you h2 {
  font-size: 22px;
  font-weight: 700;
  color: #040406;
  margin-bottom: 6px;
  opacity: 0;
  animation: fadeIn 200ms 400ms ease-out forwards;
  letter-spacing: -0.3px;
}
.thank-you p {
  font-size: 14px;
  color: #888;
  opacity: 0;
  animation: fadeIn 200ms 500ms ease-out forwards;
}
@keyframes scaleIn { to { transform: scale(1); } }
@keyframes drawCheck { to { stroke-dashoffset: 0; } }
@keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body>

<div id="fv" style="display:flex;flex-direction:column;min-height:100vh">
  <div class="header">
    <div class="hg1"></div>
    <div class="hg2"></div>
    <div class="hc">
      <!-- Inline SVG (white) — kept inline because launch.py renders the form
           from a tmp file outside the repo, so a relative <img src> would 404. -->
      <svg class="logo" viewBox="0 0 2500 1027" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Homey">

      </svg>
      <h2>Good morning!</h2>
      <p>Completely anonymous. No names or devices tracked.</p>
    </div>
  </div>
  <div class="body">
    <p class="ql">Which team are you on? <span class="ol">(required)</span></p>
    <div class="pills" role="group" aria-label="Department">
      <button type="button" class="pill" data-dept="Operations">Operations</button>
      <button type="button" class="pill" data-dept="Revenue">Revenue</button>
      <button type="button" class="pill" data-dept="Service">Service</button>
      <button type="button" class="pill" data-dept="Technology">Technology</button>
    </div>

    <p class="ql">How happy are you today?</p>
    <div class="emoji-display" id="emoji">😐</div>
    <div class="slider-row">
      <span>1</span>
      <input type="range" min="1" max="10" value="5" step="1" id="sl" aria-label="Happiness score" />
      <span>10</span>
    </div>
    <div class="score-display">
      <span class="score-badge" id="sv">5</span>
      <span class="mood-label" id="ml">Doing alright</span>
    </div>

    <p class="ql">Anything on your mind? <span class="ol">(optional)</span></p>
    <textarea id="fb" placeholder="Share your thoughts..." spellcheck="true" autocomplete="off"></textarea>

    <button class="submit-btn" id="sb" disabled>Submit</button>
    <button type="button" class="change-link" id="cdept" style="display:none">Change department</button>
    <p class="footer-note">Your response is 100% anonymous</p>
  </div>
</div>

<div id="tv" class="thank-you">
  <div class="success-mark" aria-hidden="true">
    <svg viewBox="0 0 32 32">
      <path class="check" d="M7 16.5 L13.5 23 L25 10" />
    </svg>
  </div>
  <h2>Thanks for sharing</h2>
  <p>Have a great day.</p>
</div>

<script>
var WEBHOOK_URL = "__WEBHOOK_URL__";

var sl  = document.getElementById("sl");
var sv  = document.getElementById("sv");
var em  = document.getElementById("emoji");
var ml  = document.getElementById("ml");
var fb  = document.getElementById("fb");
var sb  = document.getElementById("sb");
var fv  = document.getElementById("fv");
var tv  = document.getElementById("tv");
var cdept = document.getElementById("cdept");

var moods = {
  1:  { e: "😢", l: "Really struggling",      c: "#E24B4A" },
  2:  { e: "😞", l: "Not great",              c: "#E24B4A" },
  3:  { e: "😟", l: "Could be better",        c: "#D85A30" },
  4:  { e: "😕", l: "A bit down",             c: "#D85A30" },
  5:  { e: "😐", l: "Doing alright",          c: "#BA7517" },
  6:  { e: "🙂", l: "Pretty decent",          c: "#BA7517" },
  7:  { e: "😊", l: "Feeling good",           c: "#639922" },
  8:  { e: "😄", l: "Great day!",             c: "#7C57FC" },
  9:  { e: "🤩", l: "Absolutely buzzing!",    c: "#7C57FC" },
  10: { e: "🚀", l: "On top of the world!",   c: "#7C57FC" }
};

var state = {
  department: null,
  scoreTouched: false
};

function updScore(v) {
  var n = Math.round(v);
  var m = moods[n];
  sv.textContent = n;
  em.textContent = m.e;
  ml.textContent = m.l;
  ml.style.color = m.c;
  sv.style.transform = "scale(1.1)";
  em.style.transform = "scale(1.15)";
  setTimeout(function () {
    sv.style.transform = "scale(1)";
    em.style.transform = "scale(1)";
  }, 120);
}

function refreshSubmitGate() {
  // Submit stays disabled until both department and score are set.
  // (The slider has a default value, but we only count it as "set" once
  // the user has actually moved it — otherwise people submit a default 5
  // without thinking about it.)
  var ready = !!state.department && state.scoreTouched;
  sb.disabled = !ready;
}

sl.addEventListener("input", function () {
  state.scoreTouched = true;
  updScore(sl.value);
  refreshSubmitGate();
});

// ----- Department pills -----
var pillNodes = document.querySelectorAll(".pill");
function selectDept(name, persist) {
  state.department = name;
  pillNodes.forEach(function (p) {
    var match = p.getAttribute("data-dept") === name;
    if (match) p.classList.add("is-selected");
    else p.classList.remove("is-selected");
  });
  if (cdept) cdept.style.display = name ? "block" : "none";
  if (persist && window.pywebview && window.pywebview.api && window.pywebview.api.save_department) {
    try { window.pywebview.api.save_department(name); } catch (_) {}
  }
  refreshSubmitGate();
}

pillNodes.forEach(function (p) {
  p.addEventListener("click", function () {
    selectDept(p.getAttribute("data-dept"), false);
  });
});

cdept.addEventListener("click", function () {
  state.department = null;
  pillNodes.forEach(function (p) { p.classList.remove("is-selected"); });
  cdept.style.display = "none";
  // Tell launch.py to clear the saved department so next launch starts clean.
  if (window.pywebview && window.pywebview.api && window.pywebview.api.clear_department) {
    try { window.pywebview.api.clear_department(); } catch (_) {}
  }
  refreshSubmitGate();
});

// Hook for launch.py to pre-select a previously-saved department.
window.homeyPulseSetDepartment = function (name) {
  if (!name) return;
  selectDept(name, false);
};

// ----- Success animation -----
function showThanks() {
  fv.style.display = "none";
  tv.style.display = "flex";
}

// ----- Submit -----
sb.addEventListener("click", function () {
  if (sb.disabled) return;
  if (!/^https:\/\/.+/i.test(WEBHOOK_URL)) {
    sb.disabled = true;
    sb.style.background = "#999999";
    sb.textContent = "Webhook not configured";
    return;
  }
  sb.disabled = true;
  sb.style.background = "#5A3BD4";
  sb.textContent = "Sending...";

  var data = {
    type: "happiness",
    department: state.department,
    score: Math.round(sl.value),
    feedback: fb.value.trim(),
    date: new Date().toISOString(),
    timestamp: new Date().toISOString()
  };

  // Persist department for next launch (best-effort, fire-and-forget).
  if (state.department && window.pywebview && window.pywebview.api && window.pywebview.api.save_department) {
    try { window.pywebview.api.save_department(state.department); } catch (_) {}
  }

  var done = false;
  function fin() { if (!done) { done = true; showThanks(); } }
  try {
    fetch(WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(data),
      redirect: "follow"
    }).then(fin).catch(fin);
  } catch (e) { fin(); }

  // Show the success state regardless after 3s — webhook latency must
  // never block the user closing the popup.
  setTimeout(fin, 3000);
});
</script>
</body>
</html>
