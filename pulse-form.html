<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homey Pulse</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:#FFFFFF;min-height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-user-select:none;user-select:none}
.header{background:#040406;padding:32px 36px 28px;text-align:center;position:relative;overflow:hidden}
.hg1{position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:#7C57FC;opacity:.15;border-radius:50%}
.hg2{position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;background:#DBFF00;opacity:.1;border-radius:50%}
.hc{position:relative;z-index:1}
.header h2{font-size:21px;font-weight:600;color:#FFF;margin:16px 0 6px}
.header p{font-size:13px;color:rgba(255,255,255,.5)}
.body{padding:24px 36px 28px;flex:1;display:flex;flex-direction:column}
.ql{font-size:15px;font-weight:600;color:#040406;display:block;margin-bottom:14px}
.ol{font-weight:400;color:#aaa}
.emoji-display{text-align:center;margin-bottom:6px;font-size:52px;transition:all .2s ease}
.slider-row{display:flex;align-items:center;gap:14px;margin-bottom:4px}
.slider-row span{font-size:13px;color:#bbb;min-width:16px}
.slider-row span:last-child{text-align:right}
input[type=range]{-webkit-appearance:none;flex:1;height:8px;border-radius:4px;background:linear-gradient(to right,#E24B4A,#FAC775,#7C57FC);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#FFF;border:3px solid #7C57FC;cursor:pointer;transition:transform .15s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
.score-display{text-align:center;margin-bottom:20px}
.score-badge{display:inline-block;background:#040406;color:#DBFF00;font-size:28px;font-weight:700;padding:6px 22px;border-radius:12px;min-width:50px;transition:transform .15s}
.mood-label{display:block;font-size:13px;color:#888;margin-top:5px;font-weight:500;transition:color .2s}
textarea{width:100%;border:2px solid #f0f0f0;border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;min-height:72px;resize:none;outline:none;color:#040406;background:#fafafa;transition:border-color .2s,background .2s;-webkit-user-select:text;user-select:text}
textarea:focus{border-color:#7C57FC;background:#FFF}
textarea::placeholder{color:#ccc}
.submit-btn{width:100%;padding:14px;background:#7C57FC;color:#FFF;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:16px;letter-spacing:.3px}
.submit-btn:hover{background:#6B45EB;transform:translateY(-1px)}
.submit-btn:active{transform:scale(.98)}
.submit-btn:disabled{cursor:default;transform:none}
.footer-note{font-size:11px;color:#ccc;text-align:center;margin-top:12px}
.thank-you{display:none;align-items:center;justify-content:center;flex-direction:column;min-height:100vh;background:#FFFFFF}
.ty-emoji{font-size:68px;margin-bottom:18px;animation:bounceIn .5s ease}
.thank-you h2{font-size:26px;font-weight:700;color:#040406;margin-bottom:6px}
.thank-you p{font-size:15px;color:#888}
@keyframes bounceIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
.cp{position:absolute;top:-20px;animation:cfall linear forwards}
@keyframes cfall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<div id="fv" style="display:flex;flex-direction:column;min-height:100vh">
  <div class="header">
    <div class="hg1"></div>
    <div class="hg2"></div>
    <div class="hc">
      <svg width="100" height="41" viewBox="0 0 2500 1027" fill="none" xmlns="http://www.w3.org/2000/svg">

      </svg>
      <h2>Good morning!</h2>
      <p>Completely anonymous. No names or devices tracked.</p>
    </div>
  </div>
  <div class="body">
    <p class="ql">How happy are you today?</p>
    <div class="emoji-display" id="emoji">😐</div>
    <div class="slider-row">
      <span>1</span>
      <input type="range" min="1" max="10" value="5" step="1" id="sl" />
      <span>10</span>
    </div>
    <div class="score-display">
      <span class="score-badge" id="sv">5</span>
      <span class="mood-label" id="ml">Doing alright</span>
    </div>
    <p class="ql">Anything on your mind?</p>
    <textarea id="fb" placeholder="Share your thoughts..."></textarea>
    <button class="submit-btn" id="sb">Submit</button>
    <p class="footer-note">Your response is 100% anonymous</p>
  </div>
</div>

<div id="tv" class="thank-you">
  <div class="confetti" id="cf"></div>
  <div class="ty-emoji">🎉</div>
  <h2>Thank you!</h2>
  <p>Have an amazing day.</p>
</div>

<script>
var WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwLzElxQ74DOCTOMgAi0eqzXR0P1kWrADLcL7eb6yAdTBo6Y037jNfaduBB3yiAc0VW/exec";
var sl = document.getElementById("sl");
var sv = document.getElementById("sv");
var em = document.getElementById("emoji");
var ml = document.getElementById("ml");
var fb = document.getElementById("fb");
var sb = document.getElementById("sb");
var fv = document.getElementById("fv");
var tv = document.getElementById("tv");

var moods = {
  1:  { e: "\uD83D\uDE22", l: "Really struggling", c: "#E24B4A" },
  2:  { e: "\uD83D\uDE1E", l: "Not great", c: "#E24B4A" },
  3:  { e: "\uD83D\uDE1F", l: "Could be better", c: "#D85A30" },
  4:  { e: "\uD83D\uDE15", l: "A bit down", c: "#D85A30" },
  5:  { e: "\uD83D\uDE10", l: "Doing alright", c: "#BA7517" },
  6:  { e: "\uD83D\uDE42", l: "Pretty decent", c: "#BA7517" },
  7:  { e: "\uD83D\uDE0A", l: "Feeling good", c: "#639922" },
  8:  { e: "\uD83D\uDE04", l: "Great day!", c: "#7C57FC" },
  9:  { e: "\uD83E\uDD29", l: "Absolutely buzzing!", c: "#7C57FC" },
  10: { e: "\uD83D\uDE80", l: "On top of the world!", c: "#7C57FC" }
};

function upd(v) {
  var m = moods[Math.round(v)];
  sv.textContent = Math.round(v);
  em.textContent = m.e;
  ml.textContent = m.l;
  ml.style.color = m.c;
  sv.style.transform = "scale(1.1)";
  em.style.transform = "scale(1.15)";
  setTimeout(function(){ sv.style.transform = "scale(1)"; em.style.transform = "scale(1)"; }, 120);
}

sl.addEventListener("input", function(){ upd(sl.value); });

function confetti() {
  var c = document.getElementById("cf");
  var cols = ["#DBFF00","#7C57FC","#E24B4A","#FFFFFF","#040406"];
  for (var i = 0; i < 80; i++) {
    var p = document.createElement("div");
    p.className = "cp";
    p.style.left = Math.random()*100+"%";
    p.style.background = cols[Math.floor(Math.random()*cols.length)];
    p.style.width = (Math.random()*10+6)+"px";
    p.style.height = (Math.random()*10+6)+"px";
    p.style.borderRadius = Math.random()>.5?"50%":"2px";
    p.style.animationDuration = (Math.random()*2+1.5)+"s";
    p.style.animationDelay = (Math.random()*.8)+"s";
    c.appendChild(p);
  }
}

function showThanks() {
  fv.style.display = "none";
  tv.style.display = "flex";
  confetti();
}

sb.addEventListener("click", function() {
  sb.disabled = true;
  sb.style.background = "#5A3BD4";
  sb.textContent = "Sending...";
  var data = { score: Math.round(sl.value), feedback: fb.value.trim(), date: new Date().toISOString() };
  var done = false;
  function fin() { if (!done) { done = true; showThanks(); } }
  try {
    fetch(WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(data), redirect: "follow" }).then(fin).catch(fin);
  } catch(e) { fin(); }
  setTimeout(fin, 3000);
});
</script>
</body>
</html>
